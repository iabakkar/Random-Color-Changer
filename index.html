<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random color Changer</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(99, 96, 96);
        }

        h1 {

            color: rgb(0, 0, 0);
        }

        .box {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.144);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease-in-out;
            box-shadow: 0px 0px 10px rgba(238, 236, 236, 0.308);
        }

        .box:hover {
           transform: scale(1.05);
           cursor: pointer;
        }

        .changeBtn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 10px;
            background-color: white;
            border: 1px solid black;
        }

        .changeBtn:hover {
            background-color: rgb(235, 227, 227);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>
            Random Color Changer
        </h1>
        <button class="changeBtn">Change the color!</button>
    </div>
</body>

<script>
    let changeBtn = document.querySelector(".changeBtn")

    changeBtn.addEventListener("click", () => {
        let randomR = Math.ceil(Math.random() * 255)
        let randomG = Math.ceil(Math.random() * 255)
        let randomB = Math.ceil(Math.random() * 255)

        document.body.style.backgroundColor = `rgb(${randomR}, ${randomG}, ${randomB})`
    })
</script>

</html>
